name: Update developer graph

on:
  workflow_dispatch:
  push:
    branches:
      - readme-next
    paths:
      - '.github/scripts/generate-developer-graph.py'
      - '.github/workflows/update-developer-graph.yml'
  schedule:
    - cron: '17 2 * * 1'

permissions:
  contents: write

jobs:
  update-graph:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.12'

      - name: Generate GitHub developer graph
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: hu-qi
        run: python .github/scripts/generate-developer-graph.py

      - name: Commit updated graph
        uses: stefanzweifel/git-auto-commit-action@8621497c8c39c72f3e2a999a26b4ca1b5058a842  # v5.0.1
        with:
          commit_message: Update GitHub developer graph
          file_pattern: assets/github-developer-graph.svg assets/github-developer-graph.json
